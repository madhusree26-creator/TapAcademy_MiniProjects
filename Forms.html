<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        body{
            background-color: black;
            font-family: sans-serif;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Course Registration Form</h1>

    <p>Personal Details</p>
    <form action="" autocapitalize="on" autocomplete="on" autocorrect="on">
        <table>
            <tr>
                <td><label for="fname">First Name</label></td>
                <td>
                    <input type="text" id="fname" name="fname" placeholder="Ex:Madhusree">
                </td>
            </tr>

            <tr>
                <td><label for="sname">Surname</label></td>
                <td>
                    <input type="text" id="sname" name="sname">
                </td>
            </tr>

            <tr>
                <td><label for="mobile">Mobile Number</label></td>
                <td><input type="tel" id="mobile" name="mobile" placeholder="Ex:gmail.com"></td>
            </tr>
            <tr>
                <td><label for="email">Email</label></td>
                <td><input type="email" id="email" name="email"></td>
            </tr>
            <tr>
                <td><label for="password">Password</label></td>
                <td><input type="password" id="password" name="password"></td>
            </tr>
            <tr>
                <td><label type="cpassword">Confirm Password</label></td>
                <td><input type="cpassword" id="cpassword" name="cpassword"></td>
            </tr>
            <tr>
                <td><label for="date">Date of Birth</label></td>
                <td><input type="date" id="date" name="date"></td>
            </tr>
            <tr>
                <td><label for="age">Age</label></td>
                <td><input type="number" id="age" name="age"></td>
            </tr>
            <tr>
                <td><label for="gender">Gender</label></td>
                <td><input type="radio" name="gender" value="MALE">
                    <label>MALE</label>
                    <input type="radio" name="gender" value="FEMALE">
                    <label>FEMALE</label>
                    <input type="radio" name="gender" value="OTHERS">
                    <label>OTHERS</label>
                </td>
            </tr>
            <tr>
                <td><label for="country">Select Country</label></td>
                <td>
                    <select name="country" id="country">
                        <option value="INDIA">INDIA</option>
                        <option value="CHINA">CHINA</option>
                        <option value="USA">USA</option>
                        <option value="GERMANY">GERMANY</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label>Upload a File</label></td>
                <td><input type="file" required></td>
            </tr>
            <td><button type="submit">SUBMIT</button></td>
        </table> 
    </form>
    <p>Course Details</p>
    <form>
        <table>
            <tr>
                <td><label for="course">Select Course</label></td>
                <td>
                    <select name="course" id="course">
                        <option value="JAVA FULL STACK">JAVA FULL STACK</option>
                        <option value="PYTHON FULL STACK">PYTHON FULL STACK</option>
                        <option value="DATA SCIENCE WITH GEN AI">DATA SCIENCE WITH GEN AI</option>
                        <option value="DATA ANALYSIS">DATA ANALYSIS</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="delivery">Delivery Mode</label></td>
                <td>
                    <input type="checkbox" name="delivery" value="ONLINE">
                    <label>ONLINE</label>
                    <input type="checkbox" name="delivery" value="OFFLINE">
                    <label>OFFLINE</label>
                </td>
            </tr>
            <tr>
                <td><label for="comments">Comments</label></td>
                <td>
                    <textarea id="comments" name="comments" placeholder="Enter any additional comments..." rows="5" cols="30"></textarea>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
